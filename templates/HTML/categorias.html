<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/static/CSS/styles.css">
    <script src="/static/JavaScript/main.js" defer></script>
    <title>Document</title>
</head>
<body>
    {% include 'header.html' %}

    <div class="container mt-4">
        <h2>Categorias</h2>
        <p>Aquí puedes gestionar tus categorías de ingresos y gastos.</p>

        <button
            class="btn btn-sm btn-outline-primary"
            data-bs-toggle="modal"
            data-bs-target="#modalCrearCategorias">
            Crear categoria
        </button>

        <div class="modal fade" id="modalCrearCategorias" tabindex="-1" aria-hidden="true">
            <div class="modal-dialog">
                <form id="formCrearCategorias" method="POST" action="/categorias/crear" class="modal-content">
                    <div class="modal-header">
                        <h5 class="modal-title">Crear categoría</h5>
                        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                    </div>
                    <div class="modal-body">
                        <label for="nombre" class="form-label">Nombre</label>
                        <input type="text" id="nombre" name="nombre" class="form-control" required>
                    </div>
                    <div class="modal-footer">
                        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
                        <button type="submit" class="btn btn-primary">Guardar</button>
                    </div>
                </form>
            </div>
        </div>

        <h3 class="mt-4">Categorías existentes</h3>
        <ul class="list-group">
            {% for categoria in categorias %}
            <li class="list-group-item d-flex justify-content-between align-items-center">
                {{ categoria.nombre }}
                <form method="POST" action="/categorias/eliminar/{{ categoria.id }}" onsubmit="return confirm('¿Estás seguro de que deseas eliminar esta categoría?');">
                    <button type="submit" class="btn btn-danger btn-sm">Eliminar</button>
                </form>
            </li>
            {% endfor %}
        </ul>
    </div>

    {% include 'footer.html' %}
</body>
</html>
