<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/static/CSS/styles.css">
    <script src="/static/JavaScript/main.js" defer></script>
    <title>Document</title>
</head>
<body>
    {% include 'header.html' %}

    <div class="container mt-4">
        <h2>Categorias</h2>
        <p>Aquí puedes gestionar tus categorías de ingresos y gastos.</p>

    <!-- Botón para abrir el modal de creación de categorías -->
        <button
            class="btn btn-sm btn-outline-primary"
            data-bs-toggle="modal"
            data-bs-target="#modalCrearCategorias"
            data-id="{{ categorias.id }}"
            data-descripcion="{{ categoriass.descripcion }}">
            Crear categoria
        </button>
    
    <!-- botón para abrir el modal de creacion de categorías -->
        <div class="modal fade" id="modalCrearCategorias" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog">
        <form id="formCrearCategorias" method="POST" class="modal-content">
        <div class="modal-header">
            <h5 class="modal-title">Crear categoría</h5>
            <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
        </div>
        <div class="modal-body">

            <!-- Datos del modal Crear -->
            Nombre
            <input type="text" name="descripcion" class="form-control" required>
            </div>


        <!-- Formulario para agregar nueva categoría -->
        <table class="table table-bordered">
            <thead class="table-light">
                <tr>
                    <th>Nombre de la categoría</th>
                    <th>Acciones</th>
                </tr>
            </thead>
            <tbody>
                <tr>
                    <form method="POST" action="/categorias/crear">
                        <td>
                            <input type="text" name="nombre" class="form-control" placeholder="Nueva categoría" required>
                        </td>
                        <td>
                            <button type="submit" class="btn btn-primary">Agregar</button>
                        </td>
                    </form>
                </tr>
            </tbody>

        <!-- Lista de categorías existentes -->
        <h3>Categorías existentes</h3>
        <ul class="list-group">
            {% for categoria in categorias %}
            <li class="list-group-item d-flex justify-content-between align-items-center">
                {{ categoria.nombre }}
                <form method="POST" action="/categorias/eliminar/{{ categoria.id }}" onsubmit="return confirm('¿Estás seguro de que deseas eliminar esta categoría?');">
                    <button type="submit" class="btn btn-danger btn-sm">Eliminar</button>
                </form>

    



    {% include 'footer.html' %}
</body>
</html>
