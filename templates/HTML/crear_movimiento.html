<!DOCTYPE html>
<html>
<head>
    <title>Crear Movimiento</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='CSS/styles.css') }}">
    <script src="{{ url_for('static', filename='JavaScript/main.js') }}" defer></script>

</head>

<body>

{% include 'header.html' %}



<div class="container mt-4">
    <button class="btn btn-secondary mb-3" onclick="history.back()">
    ← Volver
    </button>
    <div class="card shadow p-4">

        <h3 class="mb-4">Crear Movimiento</h3>

        <form action="/crear_movimiento" method="POST">

            <div class="mb-3">
                <label class="form-label">Tipo</label>
                <select name="tipo" class="form-select">
                    <option value="ingreso">Ingreso</option>
                    <option value="gasto">Gasto</option>
                </select>
            </div>

            <div class="mb-3">
                <label class="form-label">Monto</label>
                <input type="number" name="monto" class="form-control" required>
            </div>

            <div class="mb-3">
                <label class="form-label">Categoría</label>
                <select name="categoria" class="form-select">
                    {% for c in categorias %}
                        <option value="{{ c.id }}">{{ c.nombre }}</option>
                    {% endfor %}
                </select>
            </div>

            <div class="mb-3">
                <label class="form-label">Fecha</label>
                <input type="date" name="fecha" class="form-control" required>
            </div>

            <div class="mb-3">
                <label class="form-label">Descripción</label>
                <input type="text" name="descripcion" class="form-control">
            </div>

            <button type="submit" class="btn btn-primary">Guardar</button>

        </form>

    </div>

</div>

</body>
</html>
