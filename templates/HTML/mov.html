<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <!-- CSS -->
    <link rel="stylesheet" href="{{ url_for('static', filename='CSS/styles.css') }}">
    
    <!-- JS -->
    <script src="{{ url_for('static', filename='JavaScript/main.js') }}" defer></script>

    <title>Movimientos</title>

</head>

<body>

{% include 'header.html' %}

<div class="container mt-4">
    <button class="btn btn-secondary mb-3" onclick="history.back()">
    ← Volver
    </button>

    <h2 class="mb-4">Movimientos</h2>

    <div class="row text-center mb-4">

        <div class="col-md-3">
            <a href="/movimientos?tipo=ingreso" class="text-decoration-none text-dark">
                <div class="card p-3 shadow-sm">
                    <img src="{{ url_for('static', filename='Imagenes/ingresos.png') }}" width="60">
                    <h5 class="mt-2">Ingresos</h5>
                </div>
            </a>
        </div>

        <div class="col-md-3">
            <a href="/movimientos?tipo=gasto" class="text-decoration-none text-dark">
                <div class="card p-3 shadow-sm">
                    <img src="{{ url_for('static', filename='Imagenes/gastos.png') }}" width="60">
                    <h5 class="mt-2">Gastos</h5>
                </div>
            </a>
        </div>

        <div class="col-md-3">
            <a href="/movimientos?tipo=transferencia" class="text-decoration-none text-dark">
                <div class="card p-3 shadow-sm">
                    <img src="{{ url_for('static', filename='Imagenes/transferencia.png') }}" width="60">
                    <h5 class="mt-2">Transferencia</h5>
                </div>
            </a>
        </div>

        <div class="col-md-3">
            <a href="/crear" class="text-decoration-none text-dark">
                <div class="card p-3 shadow-sm">
                    <img src="{{ url_for('static', filename='Imagenes/crear.png') }}" width="60">
                    <h5 class="mt-2">Crear</h5>
                </div>
            </a>
        </div>

    </div>

    <!-- TABLA -->
    <div class="card p-3 shadow-sm">
        <h4>Listado</h4>

        <table class="table">
            <thead>
                <tr>
                    <th>Tipo</th>
                    <th>Monto</th>
                    <th>Categoría</th>
                    <th>Fecha</th>
                </tr>
            </thead>
            <tbody>
                {% for m in movimientos %}
                <tr>
                    <td>{{ m.tipo }}</td>
                    <td>${{ m.monto }}</td>
                    <td>{{ m.categoria if m.categoria else 'Sin categoría' }}</td>
                    <td>{{ m.fecha }}</td>
                </tr>
                {% endfor %}
            </tbody>
        </table>

    </div>

</div>

</body>
</html>
