<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/static/CSS/styles.css">
    <title>Document</title>
</head>
<body>
    {% include 'header.html' %}

    <!--BOTON CREAR BANCO-->
    <div class="container mt-4">
        <h2>Bancos</h2>
        <div class="mb-3">
            <button type="button" class="btn btn-primary" data-bs-toggle="modal" data-bs-target="#crearBancoModal">Crear Banco +</button>
        </div>
    </div>

    <!--MODAL BOTON CREAR BANCO-->
    <div class="modal fade" id="crearBancoModal" tabindex="-1" aria-labelledby="crearBancoModalLabel" aria-hidden="true">
        <div class="modal-dialog">
            <div class="modal-content">
                <form method="POST" action="/banco/crear">
                    <div class="modal-header">
                        <h5 class="modal-title" id="crearBancoModalLabel">Crear Banco</h5>
                        <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                    </div>
                    <div class="modal-body">
                        <div class="mb-3">
                            <label class="form-label">Nombre del banco</label>
                            <input name="nombre" type="text" class="form-control" placeholder="Ej: Banco Principal" required>
                        </div>
                        <div class="row g-2">
                            <div class="col-md-6">
                                <label class="form-label">Tipo Banco (ID)</label>
                                <input name="tipo_banco_id" type="number" class="form-control" min="1" placeholder="Opcional">
                            </div>
                            <div class="col-md-6">
                                <label class="form-label">Tipo Cuenta (ID)</label>
                                <input name="tipo_cuenta_id" type="number" class="form-control" min="1" placeholder="Opcional">
                            </div>
                        </div>
                    </div>
                    <div class="modal-footer">
                        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cerrar</button>
                        <button type="submit" class="btn btn-primary">Guardar</button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <div class="container mt-3">
        <div class="list-group">
            {% for b in bancos %}
                <div class="list-group-item d-flex justify-content-between align-items-center">
                    <span>{{ b.nombre }}</span>
                    <span class="badge bg-secondary">ID {{ b.id }}</span>
                </div>
            {% else %}
                <div class="list-group-item text-muted">No hay bancos creados.</div>
            {% endfor %}
        </div>
    </div>


    {% include 'footer.html' %}

    <script src="/static/js/main.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
