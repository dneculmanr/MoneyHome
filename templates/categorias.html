<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Categorías</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/static/CSS/styles.css">
    <script src="/static/js/main.js"></script>
</head>

<body class="bg-light d-flex flex-column min-vh-100">

{% include 'header.html' %}

<main class="container mt-4 flex-grow-1">

    <!-- VOLVER -->
    <a href="/" class="btn btn-secondary mb-3">← Volver</a>

    <h2 class="mb-4">Categorías</h2>

    <!-- CREAR -->
    <div class="card shadow-sm mb-4">
        <div class="card-body">
            <form action="/categorias/crear" method="POST" class="d-flex gap-2">
                <input type="text" name="nombre" class="form-control" placeholder="Nueva categoría" required>
                <button class="btn btn-success">Agregar</button>
            </form>
        </div>
    </div>

    <!-- TABLA -->
    <div class="card shadow-sm">
        <div class="card-body">

            <table class="table table-striped align-middle">
                <thead>
                    <tr>
                        <th>Nombre</th>
                        <th style="width: 200px;">Acciones</th>
                    </tr>
                </thead>
                <tbody>

                    {% for cat in categorias %}
                    <tr>
                        <td>{{ cat.nombre }}</td>
                        <td class="d-flex gap-2">

                            <!-- EDITAR -->
                            <form action="/categorias/editar/{{ cat.id }}" method="POST" class="d-flex gap-2">
                                <input type="hidden" name="nombre" value="{{ cat.nombre }}">
                            <a href="/categorias/editar/{{ cat.id }}" class="btn btn-primary btn-sm">Editar</a>    
                            </form>

                            <!-- ELIMINAR -->
                            <form action="/categorias/eliminar/{{ cat.id }}" method="POST">
                                <button class="btn btn-danger btn-sm">Eliminar</button>
                            </form>

                        </td>
                    </tr>
                    {% endfor %}

                </tbody>
            </table>

        </div>
    </div>

</main>

{% include 'footer.html' %}

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
