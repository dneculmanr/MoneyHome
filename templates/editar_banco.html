<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Editar bancos</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- TU CSS -->
    <link rel="stylesheet" href="/static/CSS/styles.css">
    <script src="/static/js/main.js"></script>
</head>

<body>

{% include 'header.html' %}

<div class="container mt-4">

    <a href="/banco" class="btn btn-secondary mb-3">← Volver</a>

    <h2>Editar banco</h2>

    <form method="POST">

        <div class="mb-3">
            <label class="form-label">Nombre del banco</label>
            <input type="text" name="nombre_banco" value="{{ banco.nombre_banco }}" class="form-control" required>
        </div>

        <div class="mb-3">
            <label class="form-label">Saldo inicial</label>
            <input type="text" id="saldo_inicial" name="saldo_inicial" value="{{ banco.monto | int }}" class="form-control" required>
        </div>

        <button type="submit" class="btn btn-success">Guardar</button>

        <button type="button" class="btn btn-danger" data-bs-toggle="modal" data-bs-target="#modalEliminar">Eliminar</button>

    </form>

    <!--Modal Boton eliminar-->
    <div class="modal fade" tabindex="-1" id="modalEliminar">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">Confirmar eliminación</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body">
                    <p>¿Seguro que deseas eliminar este banco?</p>
                </div>
                <div class="modal-footer">
                    <form method="POST" action="/banco/eliminar" style="display:inline;">
                        <input type="hidden" name="id" value="{{ banco.id }}">
                        <button type="submit" class="btn btn-danger">Confirmar</button>
                    </form>
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
                </div>
            </div>
        </div>
    </div>



</div>

{% include 'footer.html' %}

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
