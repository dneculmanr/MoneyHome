<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Editar Movimiento</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- TU CSS -->
    <link rel="stylesheet" href="/static/CSS/styles.css">
    <script src="/static/js/main.js"></script>
</head>

<body>

{% include 'header.html' %}

<div class="container mt-4">

    <a href="/mov" class="btn btn-secondary mb-3">← Volver</a>

    <h2>Editar Movimiento</h2>

    <form method="POST">

        <div class="mb-3">
            <label class="form-label">Descripción</label>
            <input type="text" name="descripcion" value="{{ movimiento.descripcion }}" class="form-control">
        </div>

        <div class="mb-3">
            <label class="form-label">Monto</label>
            <input type="text" id="monto_editar" name="monto" value="{{ '{:,.0f}'.format(movimiento.monto | float).replace(',', '.') }}" class="form-control">
        </div>
        <!--lista desplegable BANCO-->
        <div class="mb-3">
            <label class="form-label">Banco</label>
            <select id="banco_origen" name="banco_origen" class="form-select">
                {% for b in bancos %}
                <option value="{{ b.id }}" data-saldo="{{ b.saldo_actual or 0 }}"
                    {% if b.id == movimiento.banco_id %}selected{% endif %}>
                    {{ b.nombre }}
                </option>
                {% endfor %}
            </select>
        </div>


        <div class="mb-3">
            <label class="form-label">Categoría</label>
            <select name="categoria_id" class="form-select">
                {% for categoria in categorias %}
                <option value="{{ categoria.id }}"
                    {% if categoria.id == movimiento.categoria_id %}selected{% endif %}>
                    {{ categoria.nombre }}
                </option>
                {% endfor %}
            </select>
        </div>

        <div class="mb-3">
            <label class="form-label">Fecha</label>
            <input type="date" name="fecha" value="{{ movimiento.fecha.strftime('%Y-%m-%d') if movimiento.fecha else '' }}" class="form-control">
        </div>


        <button type="submit" class="btn btn-success">Guardar</button>

        <button type="button" class="btn btn-danger" data-bs-toggle="modal" data-bs-target="#modalEliminar">Eliminar</button>

    </form>

    <!--Modal Boton eliminar-->
    <div class="modal fade" tabindex="-1" id="modalEliminar">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">Confirmar eliminación</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body">
                    <p>¿Seguro que deseas eliminar este movimiento?</p>
                </div>
                <div class="modal-footer">
                    <form method="POST" action="/mov/eliminar" style="display:inline;">
                        <input type="hidden" name="id" value="{{ movimiento.id }}">
                        <button type="submit" class="btn btn-danger">Confirmar</button>
                    </form>
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
                </div>
            </div>
        </div>
    </div>



</div>

{% include 'footer.html' %}

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
