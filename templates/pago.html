<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/static/CSS/styles.css">

    <title>Pago</title>
</head>

<body class="bg-light d-flex flex-column min-vh-100">

{% include 'header.html' %}
{% include 'basemov.html' %}

<main class="flex-grow-1 container mt-4">

    <p class="h4 mb-4">En proceso de creación</p>

    <!--Filtro de fecha - Por defecto muestra el mes actual-->
    <div class="mb-3">
        <label for="fecha" class="form-label">Filtrar por fecha:</label>
        <input type="month" id="fecha" name="fecha" class="form-control" value="{{ fecha_filtro }}">
    </div>

    <!--Tabla de gastos-->
    {% if movimientos %}
    <div class="table-responsive">
        <table class="table table-striped">
            <thead>
                <tr>
                    <th>Fecha</th>
                    <th>Descripción</th>
                    <th>Categoría</th>
                    <th>Monto</th>
                </tr>
            </thead>
            <tbody>
                {% for mov in movimientos %}
                <tr>
                    <td>{{ mov.fecha }}</td>
                    <td>{{ mov.descripcion }}</td>
                    <td>{{ mov.categoria }}</td>
                    <td>${{ mov.monto }}</td>
                </tr>
                {% endfor %}
            </tbody>
        </table>
    </div>
    {% endif %}

    <button class="btn btn-secondary mb-3" onclick="history.back()">← Volver</button>

</main>

{% include 'footer.html' %}

<script src="/static/js/main.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
