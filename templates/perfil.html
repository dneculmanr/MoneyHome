<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Perfil</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/static/CSS/styles.css">
    <script src="/static/js/main.js"></script>
</head>



<body class="bg-light d-flex flex-column min-vh-100">

{% include 'header.html' %}

<main class="container mt-4 flex-grow-1">

    <a href="/" class="btn btn-secondary mb-3">← Volver</a>

    <h2>Mi Perfil</h2>

    <div class="card shadow-sm mt-3">
        <div class="card-body">

            <form method="POST">

                <div class="mb-3">
                    <label>Nombre</label>
                    <input type="text" name="nombre" value="{{ usuario.nombre }}" class="form-control" required>
                </div>

                <div class="mb-3">
                    <label>Email</label>
                    <input type="email" name="email" value="{{ usuario.email }}" class="form-control" required>
                </div>

                <div class="mb-3">
                    <label>Password</label>
                    <input type="text" name="password" value="{{ usuario.password }}" class="form-control" required>
                </div>

                <button class="btn btn-primary">Guardar cambios</button>

            </form>

        </div>
    </div>

</main>

{% include 'footer.html' %}

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
