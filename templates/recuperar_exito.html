<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Recuperación enviada</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/static/CSS/styles.css">
</head>

<body class="login-body">

<div class="login-container">

    <div class="card shadow p-4 login-card text-center">

        <h4 class="mb-3">🔐 Recuperación de contraseña</h4>

        <p>Hemos generado un enlace de recuperación:</p>

        <!-- LINK -->
        <div class="alert alert-info">
            <a href="{{ link }}" target="_blank">{{ link }}</a>
        </div>

        <!-- BOTÓN COPIAR -->
        <button class="btn btn-primary mb-3" onclick="copiarLink()">
            Copiar enlace
        </button>

        <br>

        <a href="/login" class="btn btn-success">Volver al login</a>

    </div>

</div>

<script>
function copiarLink() {
    navigator.clipboard.writeText("{{ link }}");
    alert("Link copiado");
}
</script>

</body>
</html>
