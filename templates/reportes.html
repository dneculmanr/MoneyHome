<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="/static/CSS/styles.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <title>Reportes</title>
</head>

<body class="bg-light d-flex flex-column min-vh-100">

    {% include 'header.html' %}

    <main class="flex-grow-1 container mt-4 mb-5">

        <a href="/" class="btn btn-secondary mb-3">← Volver</a>

        <h2>Reportes</h2>
        <p>Aquí puedes generar y descargar tus reportes financieros.</p>

        <h3 class="mt-4">Lista de Reportes</h3>

        <ul class="list-group">

            <li class="list-group-item d-flex justify-content-between align-items-center">
                <span>Utilidad</span>
                <div>
                    <a href="/reporte/utilidad/excel" class="btn btn-primary">Excel</a>
                    <a href="{{ url_for('reporte_utilidad_pdf') }}" class="btn btn-secondary">PDF</a>
                </div>
            </li>

            <li class="list-group-item d-flex justify-content-between align-items-center">
                <span>Gastos mensuales</span>
                <div>
                    <a href="/reporte/gastos_mensuales/excel" class="btn btn-primary">Excel</a>
                    <a href="{{ url_for('reporte_gastos_mensuales_pdf') }}" class="btn btn-secondary">PDF</a>
                </div>
            </li>

            <li class="list-group-item d-flex justify-content-between align-items-center">
                <span>Ingresos mensuales</span>
                <div>
                    <a href="/reporte/ingresos_mensuales/excel" class="btn btn-primary">Excel</a>
                    <a href="{{ url_for('reporte_ingresos_mensuales_pdf') }}" class="btn btn-secondary">PDF</a>
                </div>
            </li>

        </ul>

    </main>

    {% include 'footer.html' %}

    <!-- JS al final (IMPORTANTE para menú hamburguesa) -->
    <script src="/static/js/main.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
