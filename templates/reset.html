<!DOCTYPE html>

<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Restablecer contraseña</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>


<body class="bg-light d-flex justify-content-center align-items-center" style="height:100vh;">

{% with messages = get_flashed_messages(with_categories=true) %}
  {% if messages %}
    {% for category, message in messages %}
      <div class="alert alert-{{ category }} alert-dismissible fade show">
        {{ message }}
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
      </div>
    {% endfor %}
  {% endif %}
{% endwith %}

<div class="card p-4 shadow" style="width:350px;">

```
<h4 class="text-center mb-3">Nueva contraseña</h4>

<form method="POST">

    <input type="password" name="password" class="form-control mb-3" placeholder="Nueva contraseña" required>

    <button class="btn btn-success w-100">Actualizar</button>

</form>

<a href="/login" class="text-center mt-3 d-block">Volver al login</a>
```

</div>

</body>
</html>
